# Phase 3.1 — Destination Desirability Model configuration.
#
# Drives the synthetic history generator, label construction, feature builder,
# and training pipeline. All compute is light and fully seeded.

synthetic_data:
  start_date: "2026-01-01"
  days: 60
  snapshots_per_day: 8          # every 3h
  loads_per_snapshot_mean: 60   # Poisson mean per snapshot (richer board keeps
                                # per-equipment onward supply healthy across the
                                # 4 hot-shot classes; ~4/3 of the 3-class value)
  unposted_rate_fraction: 0.15  # share of loads posted "call for rate" (rate=None)
  max_post_age_hours: 12.0      # a load may have been on the board up to this long
  seed: 42
  output_path: "data/synthetic_load_history.jsonl"
  # Board-field distributions discovered in Phase 3.0.5 (hot-shot equipment mix,
  # weight/length/width/height ranges, TL/PTL/LTL mode weights, and the
  # "Load Views" competition thresholds) live as seeded constants in
  # ml/data/synthetic_history_generator.py and ml/markets.py.

labeling:
  # "After I deliver, within this window, how far to the nearest viable load?"
  search_window_hours: 8.0
  min_rate_per_mile: 1.75       # a "good next load" bar (stricter than the $1.00 bid floor)
  max_deadhead_cap_miles: 300.0 # censoring cap when no viable next load exists

features:
  radius_miles: [50, 100, 150]  # market-density rings around the destination
  rate_radius_miles: 100        # ring used for median rate/miles/age features

training:
  test_size_time_fraction: 0.2  # last 20% of the time range is the test set
  model_type: "hist_gradient_boosting"
  min_bucket_count: 5           # min samples for a zone/daypart baseline bucket
  top_k: 3                      # top-k for the ranking hit-rate metric
  min_candidates_for_ranking: 4 # min loads in a (snapshot, equipment) group to score ranking
  random_seed: 42

artifacts:
  model_path: "ml/artifacts/destination_desirability_model.joblib"
  metadata_path: "ml/artifacts/destination_model_metadata.json"

# Phase 4.1 — Load Quality & Winnability Dataset.
# The broker pool is a fixed synthetic "population" (like markets): observable
# board columns are attached to each load; the latent quality knobs below are
# ground truth the outcome simulator may use for labels but never leak to a record.
brokers:
  pool_size: 40
  bonded_fraction: 0.45
  unknown_credit_fraction: 0.18   # paywalled/blank credit -> explicit "unknown" bucket
  quick_pay_fraction: 0.30
  pay_days_fast: 18.0             # latent pay-days for the best brokers
  pay_days_slow: 55.0            # latent pay-days for the worst brokers
  default_prob_best: 0.01
  default_prob_worst: 0.16
  seed: 43

# The synthetic outcome world: reservation/win, contention->coverage, negotiation,
# payment realization. Drives the emitted labeled winnability dataset.
outcomes:
  reservation_center_mult: 1.05   # broker reserve sits just above market rate
  reservation_contention_drop: 0.15
  reservation_noise: 0.06
  win_logistic_scale_rpm: 0.06    # softness of "ask <= reserve"; P(win) falls as ask rises
  bid_trial_rpm_multipliers: [0.85, 0.95, 1.0, 1.05, 1.15, 1.25]
  base_cover_halflife_hours: 18.0 # low-contention loads can linger past the horizon
  contention_cover_factor: 4.0    # higher contention -> loads vanish faster
  cover_horizon_hours: 24.0       # time-to-cover censoring cap
  negotiated_premium: 1.0         # "call for rate" loads settle ~ broker reserve
  late_pay_threshold_days: 45.0   # realized pay-days above this label as "late"
  seed: 44
  snapshot_path: "data/winnability_snapshots.jsonl"
  outcomes_path: "data/winnability_outcomes.jsonl"
  trials_path: "data/winnability_trials.jsonl"

# Phase 4.2 — Calibrated bid-winnability model.
# Trains P(win | load, broker, market, ask) on the Phase 4.1 dataset. Calibration
# is decided on a held-out VALIDATION slice only; the test slice is scored once.
winnability:
  train_fraction: 0.70           # first 70% of snapshots -> train
  validation_fraction: 0.10      # next 10% -> calibration decision (test = last 20%)
  random_seed: 42
  ece_calibration_threshold: 0.03  # calibrate only if validation ECE exceeds this
  n_reliability_bins: 10         # equal-width probability bins for ECE / reliability
  # Ask-ratio heuristic-baseline bins; the six trial multipliers land one-per-bin.
  ask_ratio_bin_edges: [0.0, 0.90, 0.975, 1.025, 1.10, 1.20, 100.0]
  min_bucket_count: 25           # min rows for a grouped-baseline bucket to be trusted
  model_path: "ml/artifacts/winnability_model.joblib"
  metadata_path: "ml/artifacts/winnability_model_metadata.json"
  reliability_chart_path: "ml/artifacts/winnability_reliability.png"
