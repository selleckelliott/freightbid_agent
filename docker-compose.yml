services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: freight
      POSTGRES_PASSWORD: freight
      POSTGRES_DB: freight
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freight"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      FREIGHTBID_CONFIG_DIR: /app/config
      DATABASE_URL: postgresql+psycopg2://freight:freight@postgres:5432/freight
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
